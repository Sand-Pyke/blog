<button class="p-2 rounded hover:bg-surface-container-low transition-colors" title="斜体">
<span class="material-symbols-outlined" data-icon="format_italic">format_italic</span>
</button>
<div class="w-px h-6 bg-outline-variant/30 self-center mx-1"></div>
<button class="p-2 rounded hover:bg-surface-container-low transition-colors" title="列表">

</button>
<button class="p-2 rounded hover:bg-surface-container-low transition-colors" title="链接">

<!-- Micro-interactions Script -->
<script>
        // Simple autosave visual feedback
        const editor = document.querySelector('.editor-content');
        const syncIcon = document.querySelector('[data-icon="sync"]');
        const syncText = syncIcon.nextElementSibling;

        let timeout;
        editor.addEventListener('input', () => {
            syncText.textContent = "正在保存...";
            syncIcon.classList.add('animate-spin');
            
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                syncText.textContent = "已保存至草稿";
                syncIcon.classList.remove('animate-spin');
            }, 1000);
        });

        // Toolbar active states (mockup)
        const buttons = document.querySelectorAll('.sticky button');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                btn.classList.toggle('active-tool');
            });
        });

        // Reading Progress Indicator (optional but nice)
        const progressBar = document.createElement('div');
        progressBar.className = 'fixed top-16 left-0 h-[2px] bg-primary z-[60] transition-all duration-150';
        progressBar.style.width = '0%';
        document.body.appendChild(progressBar);

        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            progressBar.style.width = scrolled + "%";
        });
    </script>

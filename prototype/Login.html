<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - DevLog</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=Geist&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#d5e3fc",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "inverse-primary": "#b4c5ff",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-tertiary-container": "#ffede6",
                    "surface": "#f7f9fb",
                    "tertiary-container": "#bc4800",
                    "tertiary": "#943700",
                    "on-surface-variant": "#434655",
                    "primary-container": "#2563eb",
                    "on-primary-fixed": "#00174b",
                    "tertiary-fixed": "#ffdbcd",
                    "surface-container-highest": "#e0e3e5",
                    "primary-fixed": "#dbe1ff",
                    "on-primary": "#ffffff",
                    "on-background": "#191c1e",
                    "on-error-container": "#93000a",
                    "surface-dim": "#d8dadc",
                    "tertiary-fixed-dim": "#ffb596",
                    "on-tertiary-fixed": "#360f00",
                    "surface-tint": "#0053db",
                    "background": "#f7f9fb",
                    "primary": "#004ac6",
                    "surface-container": "#eceef0",
                    "on-secondary-fixed-variant": "#3a485b",
                    "outline": "#737686",
                    "inverse-on-surface": "#eff1f3",
                    "secondary-fixed-dim": "#b9c7df",
                    "secondary": "#515f74",
                    "on-secondary-fixed": "#0d1c2e",
                    "on-surface": "#191c1e",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f2f4f6",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-tertiary": "#ffffff",
                    "surface-bright": "#f7f9fb",
                    "inverse-surface": "#2d3133",
                    "on-secondary-container": "#57657a",
                    "on-primary-container": "#eeefff",
                    "outline-variant": "#c3c6d7",
                    "secondary-container": "#d5e3fc",
                    "surface-variant": "#e0e3e5",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "stack-md": "1rem",
                    "stack-lg": "2rem",
                    "stack-xl": "4rem",
                    "gutter": "24px",
                    "stack-sm": "0.5rem",
                    "container-max": "800px",
                    "margin-mobile": "16px"
            },
            "fontFamily": {
                    "label-xs": ["Geist"],
                    "headline-md": ["Hanken Grotesk"],
                    "code-sm": ["Geist"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "display-lg-mobile": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "label-xs": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "code-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.75", "fontWeight": "400"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "1.25", "fontWeight": "700"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .login-card-blur {
            backdrop-filter: blur(8px);
        }
        input:focus {
            outline: none !important;
            box-shadow: none !important;
            border-color: theme('colors.primary') !important;
        }
        /* Custom progress bar simulation */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background-color: theme('colors.primary');
            z-index: 100;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<div id="progress-bar"></div>
<!-- Navigation Shell Suppressed per "The Destination Rule": Login is a focused transactional screen -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-gutter py-stack-xl relative overflow-hidden">
<!-- Subtle Atmospheric Background Element -->
<div class="absolute inset-0 pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-secondary-container/30 rounded-full blur-[80px]"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-[420px] z-10">
<!-- Branding Anchor -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-headline-md font-bold text-on-surface tracking-tight">
                    DevLog
                </h1>
<p class="font-label-xs text-label-xs text-on-surface-variant mt-2 uppercase tracking-widest">
                    Developer Journal &amp; Insights
                </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-8 md:p-10 shadow-sm transition-all duration-500 hover:shadow-md">
<div class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">欢迎回来</h2>
<p class="font-body-md text-on-surface-variant text-sm mt-1">请登录您的开发者账号</p>
</div>
<form class="space-y-6" id="loginForm">
<!-- Email/Username -->
<div class="space-y-2">
<label class="font-label-xs text-label-xs text-on-surface-variant block" for="identity">邮箱或用户名</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container border border-outline-variant/50 rounded-lg font-body-md text-on-surface transition-all placeholder:text-outline/50" id="identity" name="identity" placeholder="name@example.com" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-xs text-label-xs text-on-surface-variant block" for="password">密码</label>
<a class="font-label-xs text-label-xs text-primary hover:underline underline-offset-4" href="#">忘记密码？</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container border border-outline-variant/50 rounded-lg font-body-md text-on-surface transition-all" id="password" name="password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 bg-surface" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-sm text-on-surface-variant select-none" for="remember">保持登录状态</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-3 px-6 rounded-lg font-headline-md text-base font-semibold hover:bg-primary/90 active:scale-[0.98] transition-all duration-200" type="submit">
                        登录
                    </button>
</form>
<!-- Divider -->
<div class="relative my-stack-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-container-lowest px-2 text-on-surface-variant font-label-xs">或其他方式</span>
</div>
</div>
<!-- GitHub Login -->
<button class="w-full flex items-center justify-center gap-3 border border-outline-variant py-3 px-6 rounded-lg font-body-md text-on-surface hover:bg-surface-container transition-all duration-200 group" type="button">
<svg class="w-5 h-5 fill-current text-on-surface group-hover:text-primary transition-colors" viewbox="0 0 24 24">
<path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"></path>
</svg>
<span>使用 GitHub 登录</span>
</button>
</div>
<!-- Footer Links -->
<div class="mt-stack-md flex justify-center gap-stack-md">
<a class="font-label-xs text-label-xs text-on-surface-variant hover:text-primary transition-colors" href="#">注册账号</a>
<span class="text-outline-variant">•</span>
<a class="font-label-xs text-label-xs text-on-surface-variant hover:text-primary transition-colors" href="#">隐私政策</a>
</div>
</div>
</main>
<!-- Simple Footer for Transactional Page -->
<footer class="w-full py-stack-md bg-transparent">
<div class="max-w-container-max mx-auto px-gutter text-center">
<p class="font-label-xs text-label-xs text-outline/60">
                © 2024 DevLog. Built with precision.
            </p>
</div>
</footer>
<script>
        // Micro-interaction for Password Toggle
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const pwdIcon = document.getElementById('passwordIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                pwdIcon.innerText = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                pwdIcon.innerText = 'visibility';
            }
        }

        // Fake progress bar simulation on load
        window.addEventListener('load', () => {
            const bar = document.getElementById('progress-bar');
            bar.style.width = '30%';
            setTimeout(() => {
                bar.style.width = '100%';
                setTimeout(() => {
                    bar.style.opacity = '0';
                }, 400);
            }, 300);
        });

        // Form Submission visual feedback
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="flex items-center justify-center gap-2">登录中... <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            // Simulating a slight delay for the "pro" feel
            setTimeout(() => {
                alert('登录成功！正在跳转...');
                window.location.reload();
            }, 1200);
        });

        // Subtle parallax effect on background
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelectorAll('.absolute.inset-0 div').forEach((div, index) => {
                const factor = (index + 1) * 2;
                div.style.transform = `translate(${moveX * factor}px, ${moveY * factor}px)`;
            });
        });
    </script>
</body></html>

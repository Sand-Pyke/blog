services:
  db:
    image: postgres:14-alpine
    container_name: blog_db
    restart: always
    environment:
      POSTGRES_USER: postgres      # 替换为实际值
      POSTGRES_PASSWORD: 293617
      POSTGRES_DB: blog_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: blog_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: 293617
      DB_NAME: blog_db
      DB_PORT: 5432
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: blog_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

# 声明命名卷（持久化数据库数据）
volumes:
  pg_data:
services:
  db:
    image: postgres:14-alpine
    container_name: my-blog-db
    restart: always
    environment:
      POSTGRES_USER: your_db_user      # 替换为实际值
      POSTGRES_PASSWORD: your_db_pass
      POSTGRES_DB: your_db_name
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U your_db_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: my-blog-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_USER: your_db_user
      DB_PASSWORD: your_db_pass
      DB_NAME: your_db_name
      DB_PORT: 5432
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: my-blog-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

# 声明命名卷（持久化数据库数据）
volumes:
  pg_data: